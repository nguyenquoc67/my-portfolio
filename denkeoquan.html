<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đèn Kéo Quân - Nguyễn Quốc Phong</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Arial, sans-serif;
  background: radial-gradient(ellipse at center, #1a0533 0%, #0a0015 70%);
  min-height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px 60px;
}

/* HEADER */
.header { text-align:center; margin-bottom:10px; }
.avatar-circle {
  width:110px; height:110px;
  border-radius:50%;
  border:3px solid #ffd700;
  overflow:hidden;
  margin:0 auto 12px;
  box-shadow:0 0 20px rgba(255,215,0,0.3);
}
.avatar-circle img { width:100%; height:100%; object-fit:cover; }
h1 {
  font-size:1.7rem; font-weight:700;
  background:linear-gradient(90deg,#ffd700,#ff8c00);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header p { color:#c9a0ff; font-size:0.85rem; margin-top:4px; }

.back-link {
  display:inline-block; margin:10px 0 24px;
  color:#ffd700; text-decoration:none;
  border:1px solid #ffd700; padding:5px 16px;
  border-radius:20px; transition:background .2s;
}
.back-link:hover { background:rgba(255,215,0,.12); }

/* ĐÈN */
.lamp-title {
  color:#ffd700; font-size:1.15rem;
  margin-bottom:14px; text-align:center; letter-spacing:1px;
}
.scene {
  width:360px; height:360px;
  perspective:1000px;
  margin:0 auto;
}
.carousel {
  width:100%; height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 12s linear infinite;
}
.carousel:hover { animation-play-state:paused; }
.face {
  position:absolute;
  width:160px; height:215px;
  left:100px; top:72px;
  border:3px solid #ffd700;
  border-radius:12px;
  overflow:hidden;
  background:#1a0533;
  box-shadow:0 0 20px rgba(255,215,0,0.3);
}
.face img { width:100%; height:100%; object-fit:cover; display:block; }
.face:nth-child(1){transform:rotateY(0deg)   translateZ(250px);}
.face:nth-child(2){transform:rotateY(60deg)  translateZ(250px);}
.face:nth-child(3){transform:rotateY(120deg) translateZ(250px);}
.face:nth-child(4){transform:rotateY(180deg) translateZ(250px);}
.face:nth-child(5){transform:rotateY(240deg) translateZ(250px);}
.face:nth-child(6){transform:rotateY(300deg) translateZ(250px);}
@keyframes spin { from{transform:rotateY(0deg);} to{transform:rotateY(360deg);} }

.glow {
  width:360px; height:20px; margin:-8px auto 0;
  background:radial-gradient(ellipse,rgba(255,215,0,0.2) 0%,transparent 70%);
  filter:blur(6px);
}
.hover-hint { text-align:center; color:#777; font-size:12px; margin-top:10px; margin-bottom:36px; }

/* QUIZ */
.quiz-section {
  width:100%; max-width:700px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:16px; padding:24px; text-align:center;
}
.quiz-section h2 { color:#ffd700; font-size:1.1rem; margin-bottom:16px; }
.quiz-section img {
  width:100%; max-width:600px;
  border-radius:12px;
  border:2px solid rgba(255,215,0,0.4);
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="header">
  <div class="avatar-circle">
    <img src="images/avatar.jpg" alt="Nguyễn Quốc Phong">
  </div>
  <h1>Nguyễn Quốc Phong</h1>
  <p>Sinh viên Công nghệ thông tin · Web & AI Developer</p>
</div>

<a href="index.html" class="back-link">← Về Portfolio</a>

<p class="lamp-title">🏮 Đèn Kéo Quân 3D</p>
<div class="scene">
  <div class="carousel">
    <div class="face"><img src="images/h1.jpg" alt="Ảnh 1"></div>
    <div class="face"><img src="images/h2.jpg" alt="Ảnh 2"></div>
    <div class="face"><img src="images/h3.jpg" alt="Ảnh 3"></div>
    <div class="face"><img src="images/h4.jpg" alt="Ảnh 4"></div>
    <div class="face"><img src="images/h5.jpg" alt="Ảnh 5"></div>
    <div class="face"><img src="images/h6.jpg" alt="Ảnh 6"></div>
  </div>
</div>
<div class="glow"></div>
<p class="hover-hint">Rê chuột vào đèn để dừng · Di ra để quay tiếp</p>

<div class="quiz-section">
  <h2>📋 Kết quả Bài tập 18 (Trắc nghiệm)</h2>
  <img src="images/baitap18.png" alt="Kết quả bài tập 18"
       onerror="this.src='images/baitap18.jpg'">
</div>

</body>
</html>
